```html
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manzanas de Oro - Tribu Encendida</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top, #1e293b 0%, #0f172a 100%);
            color: #e2e2e2;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        /* Logo de cabecera */
        .logo-main {
            width: 210px;
            margin: 0 auto 1.5rem;
            filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.15));
            transition: transform 0.5s ease;
        }
        
        .logo-main:hover {
            transform: scale(1.05);
        }

        .gold-title {
            color: #d4af37;
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            line-height: 1;
            margin-bottom: 0.75rem;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        .card {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.8);
            position: relative;
            overflow: hidden;
            z-index: 10;
        }

        /* Marca de Agua con el Logo de la Tribu */
        .watermark {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            height: 90%;
            background-image: url('https://raw.githubusercontent.com/Ariel2-0-0-3/Proverbio-25-11/main/logo.png');
            background-repeat: no-repeat;
            background-position: center;
            background-size: contain;
            opacity: 0.04;
            pointer-events: none;
            z-index: -1;
        }

        /* Botón Generar Situación en Azul Diferente */
        .apple-btn {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: #ffffff;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .apple-btn:hover {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            transform: translateY(-3px);
            box-shadow: 0 15px 30px -5px rgba(37, 99, 235, 0.4);
        }

        .reveal-btn {
            border: 1px solid rgba(255,255,255,0.3);
            color: #ffffff;
            background: rgba(255, 255, 255, 0.05);
            font-weight: 600;
            backdrop-filter: blur(5px);
        }

        .reveal-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: #ffffff;
        }

        .status-badge {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #94a3b8;
        }

        .fade-in {
            animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #icon-display {
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.2));
        }

        /* Estilo Dorado para la Reflexión */
        .gold-reflection {
            background: rgba(212, 175, 55, 0.08);
            border: 1px solid rgba(212, 175, 55, 0.3);
            color: #d4af37;
            text-shadow: 0 0 8px rgba(212, 175, 55, 0.2);
        }
    </style>
</head>
<body class="p-4">

    <div class="w-full max-w-lg">
        <header class="text-center mb-10 fade-in">
            <!-- Logo Oficial -->
            <img src="https://raw.githubusercontent.com/Ariel2-0-0-3/Proverbio-25-11/main/logo.png" 
                 alt="Tribu Encendida Logo" 
                 class="logo-main"
                 onerror="this.src='https://img.icons8.com/ios-filled/150/ffffff/fire-alt.png'; this.style.opacity='0.3';">
            
            <h1 class="gold-title">Manzanas de Oro</h1>
            <div class="inline-block px-4 py-1 rounded-full status-badge text-[9px] tracking-[0.3em] font-bold uppercase">
                Proverbio 25:11
            </div>
        </header>

        <main class="card rounded-[3rem] p-10 md:p-14 text-center">
            <!-- Marca de agua interna -->
            <div class="watermark"></div>

            <div id="icon-display" class="text-7xl mb-10 transition-transform duration-700 select-none">🍎</div>

            <div id="content-box" class="min-h-[240px] flex flex-col justify-center relative">
                <h2 id="scenario-title" class="text-2xl font-bold mb-4 text-white tracking-tight">¿Qué harías tú?</h2>
                <p id="scenario-desc" class="text-slate-400 mb-10 leading-relaxed text-lg">
                    Haz clic en el botón azul para lanzar una nueva situación de sabiduría.
                </p>
                
                <button id="btn-reveal" onclick="revelarConsejo()" class="hidden reveal-btn py-3 px-8 rounded-2xl mx-auto mb-8 transition-all">
                    Ver Reflexión
                </button>

                <!-- El contenedor de la reflexión se mantiene dorado -->
                <div id="advice-result" class="hidden p-6 gold-reflection rounded-3xl text-left mb-10 fade-in">
                    <!-- Contenido dinámico -->
                </div>
            </div>

            <button onclick="nuevaCapsula()" class="apple-btn w-full py-5 rounded-2xl shadow-xl text-sm font-black">
                Generar Situación
            </button>
        </main>

        <footer class="mt-12 text-center flex flex-col gap-2">
            <p class="text-[10px] tracking-[0.4em] text-slate-400 uppercase font-bold">
                Tribu Encendida &copy; 2026
            </p>
            <p class="text-[8px] tracking-[0.6em] text-slate-600 uppercase font-medium">
                "Una Tribu, un Fuego"
            </p>
        </footer>
    </div>

    <script>
        const situaciones = [
            { t: "Error del Colega", d: "Un compañero comete un error leve en un reporte frente al jefe.", a: "No lo corrijas en público. La plata es el silencio discreto; el oro es decírselo a solas después para que él mismo lo arregle." },
            { t: "Junta Tensa", d: "Todos están discutiendo por un problema y nadie llega a una solución.", a: "No grites más. La palabra oportuna es la que calma: propón una pausa o una pregunta que invite a pensar, no a pelear." },
            { t: "Cansancio Extremo", d: "Tu pareja llega a casa y se queja de todo apenas entra por la puerta.", a: "Escucha sin dar soluciones inmediatas. La empatía es el marco de plata; el oro es esperar a que descanse antes de hablar." },
            { t: "Plato Roto", d: "Un familiar rompe algo valioso por accidente.", a: "Pregunta si está bien antes de evaluar el daño. La relación es el tesoro real; el objeto es solo material." },
            { t: "Secreto Confiado", d: "Te cuentan algo muy personal y mueres por compartirlo.", a: "La lealtad es oro puro. El silencio es el cofre de plata que protege tu integridad y tus amistades." },
            { t: "Éxito Ajeno", d: "Un amigo logra algo que tú deseabas mucho.", a: "Celébralo como si fuera tuyo. La envidia es plomo; la alegría genuina por el otro es oro de 24 quilates." },
            { t: "Crítica Injusta", d: "Alguien te critica duramente por algo que no hiciste.", a: "No te defiendas con ira. Una respuesta mansa es el marco de plata que desarma al atacante y muestra tu altura." }
        ];

        let consejoActual = "";
        let ultimaSituacion = -1;

        function nuevaCapsula() {
            const container = document.getElementById('content-box');
            const titulo = document.getElementById('scenario-title');
            const desc = document.getElementById('scenario-desc');
            const advice = document.getElementById('advice-result');
            const btnReveal = document.getElementById('btn-reveal');
            const icon = document.getElementById('icon-display');

            icon.style.transform = 'scale(1.4) rotate(15deg)';
            setTimeout(() => icon.style.transform = 'scale(1) rotate(0deg)', 400);

            container.classList.remove('fade-in');
            void container.offsetWidth; 
            container.classList.add('fade-in');
            
            advice.classList.add('hidden');
            
            let indexAleatorio;
            do {
                indexAleatorio = Math.floor(Math.random() * situaciones.length);
            } while (indexAleatorio === ultimaSituacion);
            
            ultimaSituacion = indexAleatorio;
            const item = situaciones[indexAleatorio];

            titulo.innerText = item.t;
            desc.innerText = item.d;
            consejoActual = item.a;
            
            btnReveal.classList.remove('hidden');
        }

        function revelarConsejo() {
            const advice = document.getElementById('advice-result');
            const btnReveal = document.getElementById('btn-reveal');
            
            advice.innerHTML = `
                <div class="flex items-start gap-3">
                    <div class="mt-1 text-[#d4af37] font-bold">✦</div>
                    <p class="font-semibold leading-relaxed">${consejoActual}</p>
                </div>
            `;
            advice.classList.remove('hidden');
            btnReveal.classList.add('hidden');
        }
    </script>
</body>
</html>

```
