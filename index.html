            { t: "Ruido del Vecino", d: "Tu vecino tiene la música muy alta y es tarde.", a: "No llames a la policía de inmediato. Habla con él primero al día siguiente con calma. La buena vecindad es un tesoro." },

            // CONSEJOS GENERALES
            { t: "Duda de Hablar", d: "Tienes un chisme muy jugoso pero que podría afectar a alguien.", a: "Pásalo por el filtro: ¿Es verdad? ¿Es necesario? ¿Es amable? Si falta uno, la palabra de oro es el silencio." },
            { t: "Promesa Pendiente", d: "Prometiste algo que ahora te da mucha pereza o dificultad cumplir.", a: "Hazlo. Tu palabra es tu marca de oro. Cumplir lo que dices te da un valor incalculable." },
            { t: "Momento de Ira", d: "Sientes que vas a explotar y decir cosas de las que te vas a arrepentir.", a: "Aléjate. El silencio momentáneo es la plata que salva tu integridad de oro. Habla cuando estés frío." },
            { t: "Verdad Incomoda", d: "Alguien tiene algo en los dientes o la ropa desarreglada.", a: "Díselo rápido y en voz baja. La plata es la discreción; el oro es evitarle la vergüenza." },
            { t: "Pedir Perdón", d: "Sabes que te equivocaste pero tu orgullo no te deja hablar.", a: "La palabra 'perdón' es la manzana de oro más difícil de dar, pero la que más brilla. Hazlo hoy mismo." },
            
            // ESCENARIOS ADICIONALES
            { t: "Regalo no Gustado", d: "Recibes un regalo que realmente no te gusta o no necesitas.", a: "Agradece el gesto, no el objeto. El oro es el amor de quien te lo dio; la plata es tu gratitud sincera." },
            { t: "Amigo con Mal Aliento", d: "Estás hablando con alguien y notas que tiene mal aliento.", a: "Ofrécele un chicle o menta primero para ti y luego a él. La sutileza es el marco de plata de la cortesía." },
            { t: "Compañero con Olor", d: "Un colega tiene un problema de higiene personal constante.", a: "Habla a solas y con extrema delicadeza. Usa el 'nosotros' para que no se sienta atacado. La dignidad es el oro." },
            { t: "Llorar en Público", d: "Ves a un extraño llorando en un banco del parque.", a: "Ofrécele un pañuelo o pregunta si está bien. A veces el oro es simplemente saber que no somos invisibles." },

            { t: "Día de Lluvia", d: "Alguien se moja porque no tiene paraguas y tú tienes uno grande.", a: "Comparte el espacio. El oro es la solidaridad; la plata es tu disposición a incomodarte un poco por otro." },
            { t: "Broma Pesada", d: "Alguien hace una broma sobre ti que te hace sentir mal.", a: "No rías por compromiso. Di con calma: 'Eso me dolió'. La honestidad sobre tus sentimientos es oro puro." },
            { t: "Lugar de Estacionamiento", d: "Alguien te gana el lugar que estabas esperando por segundos.", a: "Déjalo ir. Tu paz por el resto del día vale más que unos metros de caminata. El autocontrol es tu joya." },

            { t: "Gimnasio y Equipo", d: "Alguien se queda sentado en la máquina que necesitas usando el celular.", a: "Pregunta amablemente si pueden turnarse. La comunicación clara evita el resentimiento." },

            { t: "Música en Público", d: "Alguien escucha música sin audífonos en el transporte público.", a: "Si te molesta mucho, pide amablemente si puede bajar el volumen, o mejor aún, usa tus propios audífonos. El control sobre tu reacción es oro." },
            { t: "Cumpleaños Olvidado", d: "Te das cuenta de que fue el cumpleaños de un gran amigo ayer.", a: "No pongas excusas. Llama, admite el error y felicítalo con más cariño hoy. La sinceridad es la plata que limpia el descuido." },
            { t: "Invitación Rechazada", d: "Tienes que decir que no a un evento que te hace ilusión pero no tienes dinero.", a: "Di la verdad con sencillez: 'Me encantaría, pero este mes mi presupuesto no me lo permite'. La autenticidad es oro." }
        ];

        let consejoActual = "";
        let ultimaSituacion = -1;

        function nuevaCapsula() {
            const container = document.getElementById('content-box');
            const titulo = document.getElementById('scenario-title');
            const desc = document.getElementById('scenario-desc');
            const advice = document.getElementById('advice-result');
            const btnReveal = document.getElementById('btn-reveal');
            const icon = document.getElementById('icon-display');

            // Efecto visual de carga
            container.classList.remove('fade-in');
            void container.offsetWidth; // Forzar reflow
            container.classList.add('fade-in');
            advice.classList.add('hidden');
            
            // Animación del icono
            icon.style.transform = 'rotate(360deg) scale(1.2)';
            setTimeout(() => icon.style.transform = 'rotate(0deg) scale(1)', 400);

            // Algoritmo de selección aleatoria sin repetición inmediata
            let indexAleatorio;
            do {
                indexAleatorio = Math.floor(Math.random() * situaciones.length);
            } while (indexAleatorio === ultimaSituacion);
            
            ultimaSituacion = indexAleatorio;
            const item = situaciones[indexAleatorio];

            titulo.innerText = item.t;
            desc.innerText = item.d;
            consejoActual = item.a;
            
            btnReveal.classList.remove('hidden');
        }

        function revelarConsejo() {
            const advice = document.getElementById('advice-result');
            const btnReveal = document.getElementById('btn-reveal');
            
            advice.innerHTML = `<span class="text-yellow-500 font-bold block mb-1">REFLEXIÓN DE ORO:</span> ${consejoActual}`;
            advice.classList.remove('hidden');
            btnReveal.classList.add('hidden');
        }
    </script>
</body>
</html>
